services:

  db:
    image: postgres:13
    container_name: metadata_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db_init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-metadata_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api_service
    container_name: metadata_api
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/datasets/search?q="]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build: ./pipeline_service
    container_name: metadata_pipeline
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data:/data